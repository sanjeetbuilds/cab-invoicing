<!DOCTYPE html>

<title>Krishna Cabs — Billing & Quotations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --ink:#1a1a1a;
    --ink-soft:#4a4a48;
    --ink-mute:#8a8a86;
    --paper:#fafaf7;
    --paper-2:#f3f1e9;
    --line:#dcd9cf;
    --line-soft:#e8e5db;
    --accent:#7a2e2e;
    --accent-soft:#fbe9e9;
    --ok:#2d6a4f;
    --warn:#b45309;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}
  h1,h2{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-0.01em;margin:0}
  h1{font-size:24px}
  h2{font-size:19px}
  h3{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-mute);margin:0}
  button{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid var(--line);background:white;padding:8px 14px;border-radius:6px;color:var(--ink);transition:all .15s}
  button:hover{border-color:var(--ink);background:var(--paper-2)}
  button.primary{background:var(--ink);color:white;border-color:var(--ink)}
  button.primary:hover{background:#000}
  button.danger{color:var(--accent);border-color:var(--line)}
  button.danger:hover{background:var(--accent-soft);border-color:var(--accent)}
  button.ghost{border-color:transparent;background:transparent}
  button.ghost:hover{background:var(--paper-2)}
  input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:white;color:var(--ink);width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}
  input[type=checkbox]{width:auto}
  label{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-mute);font-weight:500;display:block;margin-bottom:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-mute);padding:10px 12px;border-bottom:1px solid var(--line);background:var(--paper-2)}
  td{padding:11px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  tr:hover td{background:var(--paper-2)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:var(--ink-mute)}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--paper-2);color:var(--ink-soft);font-weight:500}
  .pill.ok{background:#e7f4ec;color:var(--ok)}
  .pill.warn{background:#fef3e2;color:var(--warn)}
  .pill.accent{background:var(--accent-soft);color:var(--accent)}

  .shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .nav{background:#1a1a1a;color:#e8e6df;padding:24px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
  .nav .brand{font-family:'Fraunces',serif;font-size:20px;color:white;padding:0 8px 24px;border-bottom:1px solid #333;margin-bottom:12px}
  .nav .brand small{display:block;font-family:'Inter',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#8a8a86;margin-top:2px}
  .nav button{background:transparent;border:none;color:#bdbab1;padding:10px 12px;text-align:left;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:10px;width:100%}
  .nav button:hover{background:#2a2a28;color:white}
  .nav button.active{background:#3a3937;color:white}
  .nav button .dot{width:6px;height:6px;border-radius:50%;background:transparent}
  .nav button.active .dot{background:#d4a017}
  .nav .spacer{flex:1}
  .nav .footer{font-size:11px;color:#6a6a66;padding:12px 8px;border-top:1px solid #333}
  .nav .footer a{color:#bdbab1;display:block;margin-top:4px}

  .main{padding:32px 40px;max-width:1180px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--line);gap:16px;flex-wrap:wrap}
  .page-head h1 small{display:block;font-family:'Inter',sans-serif;font-size:12px;font-weight:400;color:var(--ink-mute);margin-top:4px;letter-spacing:0;text-transform:none}
  .page-head .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .card{background:white;border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
  .card .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

  .stat{background:white;border:1px solid var(--line);border-radius:10px;padding:18px}
  .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-mute);margin-bottom:6px}
  .stat .value{font-family:'Fraunces',serif;font-size:24px;font-weight:500}
  .stat .sub{font-size:12px;color:var(--ink-mute);margin-top:4px}

  .empty{text-align:center;padding:40px 20px;color:var(--ink-mute);font-size:13px}
  .empty h3{margin-bottom:6px;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-size:14px;font-weight:600}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:white;border-radius:12px;padding:24px;max-width:720px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal h2{margin-bottom:18px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}

  .toolbar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
  .toolbar > div{min-width:140px}
  .toolbar .sep{flex:1}
  .row-actions{display:flex;gap:4px;justify-content:flex-end}
  .help{font-size:12px;color:var(--ink-mute);margin-top:6px;line-height:1.5}

  .pdf-preview{background:var(--paper-2);border-radius:8px;padding:14px;max-height:240px;overflow:auto;font-family:monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;color:var(--ink-soft);border:1px solid var(--line)}
  .extract-tip{background:#fff8dd;border:1px solid #f4d35e;border-radius:6px;padding:8px 12px;font-size:12px;color:#7a5c00;margin-bottom:12px}

  /* Bulk entry table */
  .bulk-wrap{max-height:60vh;overflow:auto;border:1px solid var(--line);border-radius:8px;background:white}
  .bulk-table{width:100%;border-collapse:separate;border-spacing:0}
  .bulk-table thead th{position:sticky;top:0;background:var(--paper-2);font-size:10px;padding:8px 6px;z-index:2;border-bottom:1px solid var(--line)}
  .bulk-table td{padding:3px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  .bulk-table input,.bulk-table select{font-size:12px;padding:5px 7px;border-radius:4px;border:1px solid transparent;background:transparent;width:100%}
  .bulk-table input:focus,.bulk-table select:focus{background:white;border-color:var(--ink)}
  .bulk-table tr.row-saved td{background:#f4f9f5}
  .bulk-table tr.row-invalid td{background:#fdf6f6}
  .bulk-table .row-total{font-variant-numeric:tabular-nums;font-weight:500;color:var(--ink-soft);padding-right:8px;text-align:right;min-width:80px}
  .bulk-table .row-total.computed{color:var(--ok)}
  .bulk-table .row-total.warning{color:var(--warn);font-size:10.5px}

  /* =========================================================
     PRINT — invoice & quotation
     ========================================================= */
  .print-doc{
    background:white;color:#000;
    font-family:'Inter',sans-serif;font-size:11.5px;line-height:1.45;
    padding:24px 28px;
    border:1px solid var(--line);border-radius:8px;
  }
  .print-doc h1{font-family:'Fraunces',serif;font-size:24px;margin:0}
  .pd-head{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:14px;align-items:flex-end}
  .pd-head .right{text-align:right;font-size:11px}
  .pd-head .right .biz-addr{margin-top:4px;max-width:280px;margin-left:auto}
  .pd-meta-row{display:flex;justify-content:space-between;gap:24px;margin-bottom:12px;font-size:11.5px}
  .pd-meta-row .to{max-width:60%}
  .pd-meta-row .label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;color:#666;font-weight:600;margin-bottom:3px}
  .pd-meta-row .right{text-align:right}
  .pd-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:11px}
  .pd-table th{background:#f4f2eb;font-weight:600;text-align:left;padding:6px 8px;border:1px solid #999;font-size:9.5px;text-transform:uppercase;letter-spacing:0.03em;color:#000}
  .pd-table td{padding:5px 8px;border:1px solid #c4c4c4;vertical-align:top;white-space:pre-line}
  .pd-table td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pd-totals{margin-left:auto;width:320px;font-size:11.5px;margin-top:6px}
  .pd-totals .row{display:flex;justify-content:space-between;padding:3px 0}
  .pd-totals .row.grand{font-weight:600;border-top:2px solid #000;padding-top:6px;margin-top:4px;font-size:13px}
  .pd-words{font-style:italic;font-size:11px;margin-top:10px;padding-top:8px;border-top:1px solid #ccc}
  .pd-foot{margin-top:20px;font-size:9.5px;color:#444;border-top:1px solid #ccc;padding-top:8px;line-height:1.55}
  .pd-foot strong{color:#000}

  /* Hide print-only blocks in screen view */
  .print-page-num{display:none}

  @media print {
    @page{
      size: A4;
      margin: 14mm 12mm 16mm 12mm;
    }
    body { background:white }
    .nav, .page-head, .modal-actions, .no-print, button { display:none !important }
    .main { padding:0; max-width:none }
    .shell { display:block }
    .modal-bg.open { position:static !important; background:white !important; padding:0 !important; display:block !important; height:auto !important }
    .modal { box-shadow:none !important; padding:0 !important; max-width:none !important; max-height:none !important; overflow:visible !important; border-radius:0 !important }

    .print-doc {
      border:none !important; padding:0 !important; border-radius:0 !important;
      font-size:10.5px;
    }
    .print-doc h1 { font-size:22px }

    /* Repeat the table header on every page */
    .pd-table thead { display: table-header-group }
    .pd-table tfoot { display: table-footer-group }

    /* Don't break a trip group across pages */
    .trip-group { page-break-inside: avoid; break-inside: avoid }

    /* Keep totals + words + terms together on the last page */
    .pd-bottom { page-break-inside: avoid; break-inside: avoid }

    /* Repeating header on each page using running element */
    .pd-running-head { position: running(rh) }

    /* Page numbers */
    .print-page-num{
      display:block;
      position:running(pf);
      text-align:right;
      font-size:9px;
      color:#666;
    }
    @page {
      @bottom-right {
        content: "Page " counter(page) " of " counter(pages);
        font-family:'Inter',sans-serif;
        font-size:9px;
        color:#666;
      }
    }
  }
</style>
</head>

// =========================================================================
// LOGIC
// =========================================================================
function rateFor(client_id, car_type, mode){
  return DB.rate_cards.find(r => r.client_id===client_id && r.car_type===car_type && r.mode===mode);
}
function clientById(id){ return DB.clients.find(c=>c.id===id) }
function vehicleById(id){ return DB.vehicles.find(v=>v.id===id) }

function tripToLines(trip){
  const r = rateFor(trip.client_id, trip.car_type, trip.mode);
  const lines = [];
  const veh = vehicleById(trip.vehicle_id);
  const lastFour = veh ? veh.number.split(' ').pop() : '';
  const vehLabel = `${lastFour} ${trip.car_type}`.trim();
  const dateStr = formatDate(trip.date);

  if(!r){
    lines.push({ date:dateStr, vehicle:vehLabel, hsn:'996601',
      particulars:`(missing rate card for ${trip.car_type} ${trip.mode})`, rate:0, amount:0 });
    return lines;
  }
  if(trip.mode === 'outstation'){
    lines.push({ date:dateStr, vehicle:vehLabel, hsn:'996601',
      particulars:`Total kms ${trip.total_kms}`, qty:trip.total_kms,
      rate:r.per_km, amount:trip.total_kms * r.per_km });
    if(trip.driver_ta > 0){
      lines.push({ date:'', vehicle:'', hsn:'',
        particulars:"Driver's TA", qty:trip.driver_ta, rate:r.driver_ta,
        amount:trip.driver_ta * r.driver_ta });
    }
  } else {
    const baseKms = r.base_kms || 80;
    const baseHrs = r.base_hours || 8;
    const label = trip.total_kms > baseKms
      ? `Total ${trip.total_kms}kms\n${baseKms}kms/${baseHrs}hrs`
      : `${baseKms}kms/${baseHrs}hrs`;
    lines.push({ date:dateStr, vehicle:vehLabel, hsn:'996601',
      particulars:label, rate:r.base_rate, amount:r.base_rate });

    const ekm = Math.max(0, trip.total_kms - baseKms);
    if(ekm > 0) lines.push({ date:'', vehicle:'', hsn:'', particulars:'Additional kms', qty:ekm, rate:r.extra_km, amount:ekm * r.extra_km });
    const ehr = Math.max(0, (trip.total_hours||0) - baseHrs);
    if(ehr > 0) lines.push({ date:'', vehicle:'', hsn:'', particulars:'Additional hrs', qty:ehr, rate:r.extra_hour, amount:ehr * r.extra_hour });
    if(trip.night) lines.push({ date:'', vehicle:'', hsn:'', particulars:'Night Charges', rate:r.night, amount:r.night });
    if(trip.driver_ta > 0) lines.push({ date:'', vehicle:'', hsn:'', particulars:"Driver's TA", qty:trip.driver_ta, rate:r.driver_ta, amount:trip.driver_ta * r.driver_ta });
  }
  return lines;
}

function gstFor(client, subtotal){
  if(client.is_rcm){
    return { mode:'RCM', cgst:0, sgst:0, igst:0,
             cgst_label:'CGST @ 2.5% Under RCM', sgst_label:'SGST @ 2.5% Under RCM', igst_label:null };
  }
  if(client.state !== DB.company.state){
    const igst = +(subtotal * 0.05).toFixed(2);
    return { mode:'IGST', cgst:0, sgst:0, igst, igst_label:'IGST @ 5%', cgst_label:null, sgst_label:null };
  }
  const cgst = +(subtotal * 0.025).toFixed(2);
  const sgst = +(subtotal * 0.025).toFixed(2);
  return { mode:'CGST/SGST', cgst, sgst, igst:0, cgst_label:'CGST @ 2.5%', sgst_label:'SGST @ 2.5%', igst_label:null };
}

function buildInvoice(client_id, trip_ids, invoice_date, period_from, period_to, toll_override){
  const client = clientById(client_id);
  const trips = DB.trips.filter(t => trip_ids.includes(t.id))
                       .sort((a,b)=>a.date.localeCompare(b.date));
  const lineGroups = [];  // each group = lines from one trip, kept together
  let subtotal = 0;
  let tollTotal = 0;
  trips.forEach(t => {
    const ls = tripToLines(t);
    ls.forEach(l => subtotal += l.amount);
    lineGroups.push({ trip_id: t.id, lines: ls });
    tollTotal += (+t.toll || 0);
  });
  if(toll_override !== undefined && toll_override !== null && toll_override !== ''){
    tollTotal = +toll_override;
  }
  subtotal = +subtotal.toFixed(2);
  const gst = gstFor(client, subtotal);
  const net = +(subtotal + gst.cgst + gst.sgst + gst.igst + tollTotal).toFixed(2);
  return {
    client, lineGroups, subtotal, gst, toll_total: tollTotal,
    net_amount: net, period_from, period_to, invoice_date,
    trip_ids: trips.map(t=>t.id),
    words: numberToWords(Math.round(net)) + ' Only.'
  };
}

function fmtMoney(n){
  if(n === 0 || n === null || n === undefined) return '';
  return '₹\u202F' + Number(n).toLocaleString('en-IN', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmtMoneyPlain(n){
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function formatDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${+d}/${+m}/${y.slice(2)}`;
}
function formatDateLong(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${+d} ${months[+m-1]} ${y}`;
}
function numberToWords(num){
  if(num === 0) return 'Zero';
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
    'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function two(n){
    if(n < 20) return ones[n];
    const t = Math.floor(n/10), o = n%10;
    return tens[t] + (o ? ' ' + ones[o] : '');
  }
  function three(n){
    const h = Math.floor(n/100), r = n%100;
    return (h ? ones[h] + ' Hundred' + (r ? ' & ' : '') : '') + (r ? two(r) : '');
  }
  let result = '';
  const crore = Math.floor(num / 10000000); num %= 10000000;
  const lakh  = Math.floor(num / 100000);   num %= 100000;
  const thou  = Math.floor(num / 1000);     num %= 1000;
  const rest  = num;
  if(crore) result += two(crore) + ' Crore ';
  if(lakh)  result += two(lakh)  + ' Lakh ';
  if(thou)  result += two(thou)  + ' Thousand ';
  if(rest){
    const hadHigher = crore || lakh || thou;
    if(hadHigher && Math.floor(rest/100) === 0) result += '& ';
    result += three(rest);
  }
  return result.trim().replace(/\s+/g,' ');
}

// =========================================================================
// PDF text extraction (used for quotation upload)
// =========================================================================
async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    pages.push(tc.items.map(it => it.str).join(' '));
  }
  return pages.join('\n\n--- PAGE BREAK ---\n\n');
}

// Best-effort guesses to pre-fill a rate form from raw PDF text
function suggestRatesFromText(text){
  const out = { car_rows: [], company_name:'', gstin:'' };
  // GSTIN
  const gst = text.match(/\b[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9A-Z]{3}\b/);
  if(gst) out.gstin = gst[0];
  // Common car types and any number after them
  const cars = ['Dzire','Sonet','Crysta','Innova','Ertiga','Etios','Indica','Sedan','SUV'];
  cars.forEach(c => {
    const re = new RegExp(c + '[^0-9]{0,40}(\\d{3,5})','gi');
    let m, found = [];
    while((m = re.exec(text)) !== null){ found.push(+m[1]) }
    if(found.length) out.car_rows.push({ car_type:c, suggested:found.slice(0,4) });
  });
  return out;
}

  const t = DB.trips.find(x=>x.id===id);

  DB.trips = DB.trips.filter(x=>x.id!==id);
  save(); render();

// ---- Bulk trip entry (the day-30 hero workflow) ----
// Persisted to localStorage separately so a closed modal / browser crash doesn't lose work
const BULK_KEY = 'krishna_cabs_v2_bulk_draft';
let bulkRows = [];
function loadBulkDraft(){
  try { const r = localStorage.getItem(BULK_KEY); if(r){ bulkRows = JSON.parse(r) } } catch(e){}
}
function saveBulkDraft(){ localStorage.setItem(BULK_KEY, JSON.stringify(bulkRows)) }
function clearBulkDraft(){ bulkRows = []; localStorage.removeItem(BULK_KEY) }

function openBulkTrips(){
  loadBulkDraft();
  if(bulkRows.length === 0) addBulkRow();
  renderBulkTrips();
}
function addBulkRow(template){
  const last = bulkRows[bulkRows.length-1];
  const seed = template || last || {};
  bulkRows.push({
    date: seed.date || new Date().toISOString().slice(0,10),
    client_id: seed.client_id || '',
    vehicle_id: seed.vehicle_id || '',
    car_type: seed.car_type || 'Dzire',
    mode: seed.mode || 'local',
    total_kms: 80, total_hours: 8,
    night: false, driver_ta: 0, toll: 0
  });
  saveBulkDraft();
}
// Update only one row's total cell + class — no full table redraw, focus and scroll preserved
function updateBulkRow(i){
  saveBulkDraft();
  const tr = document.getElementById('brow_'+i);
  if(!tr) return;
  const st = bulkRowState(bulkRows[i]);
  tr.className = st.status==='ok' ? 'row-saved' : (st.status==='no-rate' ? 'row-invalid' : '');
  const totalCell = tr.querySelector('.row-total');
  if(totalCell){
    if(st.status==='ok'){
      totalCell.textContent = fmtMoneyPlain(st.total);
      totalCell.className = 'row-total computed';
    } else {
      totalCell.textContent = st.label;
      totalCell.className = 'row-total warning';
    }
  }
  refreshBulkFooter();
}
function refreshBulkFooter(){
  const f = document.getElementById('bulk-footer-counts'); if(!f) return;
  const ok = bulkRows.filter(r=>bulkRowState(r).status==='ok').length;
  const noRate = bulkRows.filter(r=>bulkRowState(r).status==='no-rate').length;
  const incomplete = bulkRows.filter(r=>!r.client_id||!r.vehicle_id).length;
  const total = bulkRows.reduce((s,r)=>{const st=bulkRowState(r);return s+(st.status==='ok'?st.total+(+r.toll||0):0)},0);
  f.innerHTML = `<strong>${ok}</strong> ready · ${noRate} missing rate card · ${incomplete} incomplete · Running total: <strong>${fmtMoney(total)}</strong>`;
  const saveBtn = document.getElementById('bulk-save-btn');
  if(saveBtn) saveBtn.textContent = `Save ${ok} ready trips`;
}
function duplicateBulkRow(i){
  const r = bulkRows[i];
  bulkRows.splice(i+1, 0, JSON.parse(JSON.stringify(r)));
  saveBulkDraft();
  renderBulkTrips();
  setTimeout(()=>{
    const el = document.querySelector(`#brow_${i+1} input[type="date"]`);
    if(el) el.focus();
  }, 50);
}

// Compute the row's total + status label
function bulkRowState(r){
  if(!r.client_id) return { status:'missing-client', label:'pick client' };
  if(!r.vehicle_id) return { status:'missing-vehicle', label:'pick vehicle' };
  const rate = rateFor(r.client_id, r.car_type, r.mode);
  if(!rate) return { status:'no-rate', label:'no rate card' };
  const lines = tripToLines(r);
  const total = lines.reduce((s,l)=>s+l.amount,0);
  return { status:'ok', total };
}

function saveBulkTrips(){
  let saved = 0, kept = [];
  bulkRows.forEach(r => {
    if(bulkRowState(r).status === 'ok'){
      DB.trips.push({ id:uid(), ...r, invoiced:false, invoice_id:null });
      saved++;
    } else {
      kept.push(r);  // keep incomplete rows for next session
    }
  });
  save();
  bulkRows = kept;
  saveBulkDraft();
  if(kept.length === 0){
    clearBulkDraft();
    closeModal();
  } else {
    renderBulkTrips();
  }
  render();
  if(saved > 0) alert(`${saved} trips saved.${kept.length?' ' + kept.length + ' incomplete row(s) kept for you to fix.':''}`);
}

function toggleTrip(id, on){
  if(on) invBuilder.selected.push(id);
  else invBuilder.selected = invBuilder.selected.filter(x=>x!==id);

function commitInvoice(){
  if(invBuilder.selected.length===0){ alert('Pick at least one trip'); return }
  const built = buildInvoice(invBuilder.client_id, invBuilder.selected, invBuilder.invoice_date, invBuilder.period_from, invBuilder.period_to, invBuilder.toll_override);
  const id = uid();
  const number = DB.company.next_invoice_number++;
  const saved = {
    id, invoice_number:number, invoice_date:built.invoice_date,
    client_id:invBuilder.client_id, trip_ids:[...invBuilder.selected],
    period_from:built.period_from, period_to:built.period_to,
    subtotal:built.subtotal, gst:built.gst, toll_total:built.toll_total,
    net_amount:built.net_amount, words:built.words,
    lineGroups: built.lineGroups,
    status:'unpaid', created_at:new Date().toISOString()
  };
  DB.invoices.push(saved);
  DB.trips.forEach(t=>{ if(saved.trip_ids.includes(t.id)){ t.invoiced=true; t.invoice_id=id }});
  save(); closeModal();
  setTimeout(()=>viewInvoice(id), 100);
}

function saveQuote(){
  if(!quoteDraft.client_name){ alert('Enter a client name'); return }
  if(quoteDraft.id){
    Object.assign(DB.quotations.find(q=>q.id===quoteDraft.id), quoteDraft);
  } else {
    quoteDraft.id = uid();
    DB.quotations.push(quoteDraft);
    DB.company.next_quotation_number++;
  }
  save(); closeModal(); render();
}
function deleteQuote(id){
  if(!confirm('Delete this quotation?')) return;
  DB.quotations = DB.quotations.filter(q=>q.id!==id);
  save(); render();
}
function acceptQuote(id){
  const q = DB.quotations.find(x=>x.id===id);
  if(!q.client_id){
    if(!confirm('This quotation has no linked client. Create a new client from the quotation details?')) return;
    const newClient = {
      id:uid(), name:q.client_name, gstin:q.client_gstin||'',
      address:q.client_address||'', state:'Haryana', is_rcm:false,
      default_booked_by:q.client_contact||''
    };
    DB.clients.push(newClient);
    q.client_id = newClient.id;
    alert('Created client "'+newClient.name+'". Edit in Clients tab to set state and GST treatment.');
  }
  // Replace existing rate cards for matching car+mode, leave others
  q.lines.forEach(l => {
    const existing = DB.rate_cards.find(r => r.client_id===q.client_id && r.car_type===l.car_type && r.mode===l.mode);
    const fields = { client_id:q.client_id, car_type:l.car_type, mode:l.mode };
    if(l.mode==='local'){
      Object.assign(fields, { base_rate:l.base_rate, base_kms:l.base_kms, base_hours:l.base_hours,
        extra_km:l.extra_km, extra_hour:l.extra_hour, night:l.night, driver_ta:l.driver_ta });
    } else {
      Object.assign(fields, { per_km:l.per_km, driver_ta:l.driver_ta });
    }
    if(existing){ Object.assign(existing, fields) }
    else { DB.rate_cards.push({ id:uid(), ...fields }) }
  });
  q.status = 'accepted';
  q.accepted_at = new Date().toISOString();
  save(); render();
  alert('Quotation accepted. Rate cards updated for '+(clientById(q.client_id)?.name||'client')+'.');
}

function openUploadQuote(){
  showModal(`
    <h2>Upload existing quotation</h2>
    <div class="extract-tip">
      <strong>How this works:</strong> Pick the PDF — the app reads the text and shows it below. You then fill in the rate fields manually, with the PDF text visible for reference. In the production build we'll add automatic LLM extraction.
    </div>
    <button class="primary" onclick="document.getElementById('pdfFile').click()">Choose PDF file</button>
    <div id="pdfStatus" style="margin-top:14px"></div>
  `, 'wide');
}
document.getElementById('pdfFile').addEventListener('change', async e => {
  const file = e.target.files[0]; if(!file) return;
  const status = document.getElementById('pdfStatus');
  status.innerHTML = 'Reading PDF…';
  try {
    const text = await extractPdfText(file);
    const sugg = suggestRatesFromText(text);
    status.innerHTML = `
      <div class="card" style="margin-top:10px">
        <h3>Extracted text (read-only)</h3>
        <div class="pdf-preview">${text.replace(/</g,'&lt;')}</div>
        ${sugg.gstin?`<div class="help">Detected GSTIN: <strong>${sugg.gstin}</strong></div>`:''}
        ${sugg.car_rows.length?`<div class="help">Detected car types: ${sugg.car_rows.map(r=>r.car_type+' (numbers seen: '+r.suggested.join(', ')+')').join(' · ')}</div>`:''}
      </div>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="convertExtractToQuote('${encodeURIComponent(JSON.stringify(sugg))}','${file.name.replace(/'/g,'')}')">Continue → fill quotation form</button>
      </div>
    `;
  } catch(err){
    status.innerHTML = '<div style="color:var(--accent)">Failed to read PDF: '+err.message+'</div>';
  }
  e.target.value = '';
});
function convertExtractToQuote(suggEncoded, fileName){
  const sugg = JSON.parse(decodeURIComponent(suggEncoded));
  // Pre-fill quote with detected GSTIN and one rate line per detected car type
  const prefill = {
    id: null,
    number: DB.company.quotation_prefix + String(DB.company.next_quotation_number).padStart(3,'0'),
    date: new Date().toISOString().slice(0,10),
    valid_until: new Date(Date.now()+90*86400000).toISOString().slice(0,10),
    client_id:'', client_name:'', client_address:'',
    client_gstin: sugg.gstin || '',
    client_contact:'',
    status:'draft',
    lines: sugg.car_rows.length ? sugg.car_rows.map(r=>({
      car_type:r.car_type, mode:'local',
      base_rate:r.suggested[0]||1500, base_kms:80, base_hours:8,
      extra_km:r.suggested[1]||15, extra_hour:r.suggested[2]||100,
      night:300, driver_ta:300
    })) : [{ car_type:'Dzire', mode:'local', base_rate:1500, base_kms:80, base_hours:8, extra_km:15, extra_hour:100, night:300, driver_ta:300 }],
    notes:'Imported from '+fileName+' — please verify all values before saving.'
  };
  openQuoteForm(null, prefill);
}

function saveSettings(){
  DB.company.name = document.getElementById('s_name').value;
  DB.company.gstin = document.getElementById('s_gst').value;
  DB.company.address = document.getElementById('s_addr').value;
  DB.company.phone = document.getElementById('s_phone').value;
  DB.company.email = document.getElementById('s_email').value;
  DB.company.state = document.getElementById('s_state').value;
  DB.company.next_invoice_number = +document.getElementById('s_inv').value;
  DB.company.quotation_prefix = document.getElementById('s_qpfx').value;
  DB.company.next_quotation_number = +document.getElementById('s_qnum').value;
  DB.company.terms_invoice = document.getElementById('s_t_inv').value.split('\n').map(s=>s.trim()).filter(Boolean);
  DB.company.terms_quotation = document.getElementById('s_t_quote').value.split('\n').map(s=>s.trim()).filter(Boolean);
  save(); alert('Saved.'); render();
}

// =========================================================================
// MODAL
// =========================================================================
function showModal(html, size){
  const c = document.getElementById('modalContent');
  c.innerHTML = html;
  c.style.maxWidth = size==='wide' ? '960px' : '720px';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open') }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal() });

// =========================================================================
// EXPORT / IMPORT / RESET
// =========================================================================
document.getElementById('exportData').addEventListener('click', e=>{
  e.preventDefault();
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `krishna-cabs-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
});
document.getElementById('importData').addEventListener('click', e=>{
  e.preventDefault();
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try { DB = JSON.parse(r.result); save(); render(); alert('Imported.') } catch(err){ alert('Invalid backup') } };
  r.readAsText(f);
});
document.getElementById('resetData').addEventListener('click', e=>{
  e.preventDefault();
  if(!confirm('Reset all data and reload sample?')) return;
  localStorage.removeItem(LS_KEY); location.reload();
});

// =========================================================================
// INIT
// =========================================================================
if(!load()) seed();
render();
</script>
</body>
</html>
